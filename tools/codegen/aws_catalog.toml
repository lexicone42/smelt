# ─── CloudFront: Distribution ────────────────────────────────────────────────
# Uses escape hatches for all 4 CRUD operations:
#   - Entire create wraps in DistributionConfig builder (deeply nested)
#   - caller_reference auto-generation
#   - Delete requires ETag from get + if_match

[[resource]]
struct_name = "Distribution"
sdk_crate = "aws-sdk-cloudfront"
sdk_client = "cloudfront"
type_path = "cloudfront.Distribution"

crud_create = "create_distribution"
crud_read = "get_distribution"
crud_update = "update_distribution"
crud_delete = "delete_distribution"

aws_client_field = "cloudfront_client"
aws_id_param = "id"
aws_id_source = "response_field"
aws_response_id_field = "id"
aws_tag_style = "none"
aws_updatable = true

aws_create_code = """
let origin_domain = config.require_str("/network/origin_domain")?.to_string();
let origin_id = config.str_or("/network/origin_id", "default-origin");
let comment = config.optional_str("/identity/description").unwrap_or("");
let enabled = config
    .pointer("/network/enabled")
    .and_then(|v| v.as_bool())
    .unwrap_or(true);

let origin = aws_sdk_cloudfront::types::Origin::builder()
    .domain_name(&origin_domain)
    .id(origin_id)
    .s3_origin_config(
        aws_sdk_cloudfront::types::S3OriginConfig::builder()
            .origin_access_identity("")
            .build(),
    )
    .build()
    .map_err(|e| ProviderError::InvalidConfig(format!("failed to build Origin: {e}")))?;

let default_cache = aws_sdk_cloudfront::types::DefaultCacheBehavior::builder()
    .target_origin_id(origin_id)
    .viewer_protocol_policy(
        aws_sdk_cloudfront::types::ViewerProtocolPolicy::RedirectToHttps,
    )
    .build()
    .map_err(|e| ProviderError::InvalidConfig(format!("failed to build DefaultCacheBehavior: {e}")))?;

let caller_ref = format!("smelt-{}", chrono::Utc::now().timestamp());

let dist_config = aws_sdk_cloudfront::types::DistributionConfig::builder()
    .origins(
        aws_sdk_cloudfront::types::Origins::builder()
            .quantity(1)
            .items(origin)
            .build()
            .map_err(|e| ProviderError::InvalidConfig(format!("failed to build Origins: {e}")))?,
    )
    .default_cache_behavior(default_cache)
    .comment(comment)
    .enabled(enabled)
    .caller_reference(&caller_ref)
    .build()
    .map_err(|e| ProviderError::InvalidConfig(format!("failed to build DistributionConfig: {e}")))?;

let result = self.cloudfront_client
    .create_distribution()
    .distribution_config(dist_config)
    .send()
    .await
    .map_err(|e| ProviderError::ApiError(format!("CreateDistribution: {e}")))?;

let dist = result.distribution()
    .ok_or_else(|| ProviderError::ApiError("CreateDistribution returned no distribution".into()))?;

let provider_id = dist.id();
"""

aws_read_code = """
let result = self.cloudfront_client
    .get_distribution()
    .id(provider_id)
    .send()
    .await
    .map_err(|e| ProviderError::ApiError(format!("GetDistribution: {e}")))?;

let dist = result.distribution()
    .ok_or_else(|| ProviderError::NotFound(format!("Distribution {provider_id}")))?;

let dc = dist.distribution_config();

let state = serde_json::json!({
    "identity": {
        "description": dc.map(|c| c.comment().to_string()).unwrap_or_default(),
    },
    "network": {
        "enabled": dc.map(|c| c.enabled()).unwrap_or_default(),
        "domain_name": dist.domain_name(),
        "status": dist.status(),
    }
});

let mut outputs = HashMap::new();
outputs.insert("distribution_id".into(), serde_json::json!(dist.id()));
outputs.insert("domain_name".into(), serde_json::json!(dist.domain_name()));

Ok(ResourceOutput {
    provider_id: provider_id.to_string(),
    state,
    outputs,
})
"""

aws_update_code = """
// CloudFront distributions require the full config + ETag for updates.
// For now, read-back only.
"""

aws_delete_code = """
// Must get ETag first
let get = self.cloudfront_client
    .get_distribution()
    .id(provider_id)
    .send()
    .await
    .map_err(|e| ProviderError::ApiError(format!("GetDistribution: {e}")))?;

let etag = get.e_tag().unwrap_or("").to_string();

self.cloudfront_client
    .delete_distribution()
    .id(provider_id)
    .if_match(&etag)
    .send()
    .await
    .map_err(|e| ProviderError::ApiError(format!("DeleteDistribution: {e}")))?;
"""

