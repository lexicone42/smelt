# ─── IAM: Policy ──────────────────────────────────────────────────────────
# Uses escape hatches for all 4 CRUD operations:
#   - policy_document can be string OR JSON (needs serialization)
#   - provider_id is the policy ARN (returned from create response)
#   - Update uses create_policy_version (not a standard update API)
#   - Delete: list non-default policy versions + delete each before deleting policy

[[resource]]
struct_name = "Policy"
sdk_crate = "aws-sdk-iam"
sdk_client = "iam"
type_path = "iam.Policy"

crud_create = "create_policy"
crud_read = "get_policy"
crud_update = "create_policy_version"
crud_delete = "delete_policy"

aws_client_field = "iam_client"
aws_id_param = "policy_arn"
aws_id_source = "response_field"
aws_response_id_field = "arn"
aws_tag_style = "none"
aws_updatable = true

aws_create_code = """
let name = config.require_str("/identity/name")?.to_string();

let policy_doc = config.pointer("/security/policy_document")
    .ok_or_else(|| ProviderError::InvalidConfig("security.policy_document is required".into()))?;

let doc = if policy_doc.is_string() {
    policy_doc.as_str()
        .ok_or_else(|| ProviderError::InvalidConfig("policy_document is not a valid string".into()))?
        .to_string()
} else {
    serde_json::to_string(policy_doc)
        .map_err(|e| ProviderError::InvalidConfig(format!("invalid policy JSON: {e}")))?
};

let mut req = self.iam_client
    .create_policy()
    .policy_name(&name)
    .policy_document(&doc);

if let Some(desc) = config.optional_str("/identity/description") {
    req = req.description(desc);
}
if let Some(path) = config.optional_str("/identity/path") {
    req = req.path(path);
}

let result = req.send().await
    .map_err(|e| ProviderError::ApiError(format!("CreatePolicy: {e}")))?;

let policy = result.policy()
    .ok_or_else(|| ProviderError::ApiError("CreatePolicy returned no policy".into()))?;
let provider_id = policy.arn()
    .ok_or_else(|| ProviderError::ApiError("Policy has no ARN".into()))?;
"""

aws_read_code = """
let result = self.iam_client
    .get_policy()
    .policy_arn(provider_id)
    .send()
    .await
    .map_err(|e| ProviderError::ApiError(format!("GetPolicy: {e}")))?;

let policy = result.policy()
    .ok_or_else(|| ProviderError::NotFound(format!("Policy {provider_id}")))?;

let state = serde_json::json!({
    "identity": {
        "name": policy.policy_name().unwrap_or(""),
        "description": policy.description().unwrap_or(""),
        "path": policy.path().unwrap_or("/"),
    }
});

let mut outputs = HashMap::new();
outputs.insert("policy_arn".into(), serde_json::json!(provider_id));
outputs.insert("policy_id".into(), serde_json::json!(policy.policy_id().unwrap_or("")));

Ok(ResourceOutput {
    provider_id: provider_id.to_string(),
    state,
    outputs,
})
"""

aws_update_code = """
if let Some(doc) = config.pointer("/security/policy_document") {
    let doc_str = if doc.is_string() {
        doc.as_str()
            .ok_or_else(|| ProviderError::InvalidConfig("policy_document is not a valid string".into()))?
            .to_string()
    } else {
        serde_json::to_string(doc).unwrap_or_default()
    };
    self.iam_client
        .create_policy_version()
        .policy_arn(provider_id)
        .policy_document(&doc_str)
        .set_as_default(true)
        .send()
        .await
        .map_err(|e| ProviderError::ApiError(format!("CreatePolicyVersion: {e}")))?;
}
"""

aws_delete_code = """
// Delete non-default policy versions first
let versions = self.iam_client
    .list_policy_versions()
    .policy_arn(provider_id)
    .send()
    .await
    .map_err(|e| ProviderError::ApiError(format!("ListPolicyVersions: {e}")))?;

for v in versions.versions() {
    if !v.is_default_version()
        && let Some(vid) = v.version_id()
    {
        self.iam_client
            .delete_policy_version()
            .policy_arn(provider_id)
            .version_id(vid)
            .send()
            .await
            .map_err(|e| ProviderError::ApiError(format!("DeletePolicyVersion: {e}")))?;
    }
}

self.iam_client
    .delete_policy()
    .policy_arn(provider_id)
    .send()
    .await
    .map_err(|e| ProviderError::ApiError(format!("DeletePolicy: {e}")))?;
"""

[[resource.fields]]
name = "name"
section = "identity"
type = "String"
required = true
description = "Policy name"
skip_create = true
skip_read = true

[[resource.fields]]
name = "description"
section = "identity"
type = "String"
description = "Policy description"
skip_create = true
skip_read = true

[[resource.fields]]
