# AWS Resource Catalog — declarative field definitions (no SDK introspection).
#
# Unlike the GCP catalog which introspects SDK model.rs files, the AWS catalog
# defines fields explicitly. This is because:
# 1. AWS SDK types live across many files in src/types/, not a single model.rs
# 2. AWS CRUD patterns are more diverse than GCP's 3 API styles
# 3. The hand-written schemas are already well-defined
#
# Usage:
#   cargo run -- aws-batch --catalog aws_catalog.toml --output-dir /tmp/aws-codegen

# ─── CloudWatch Logs: LogGroup ───────────────────────────────────────────────
