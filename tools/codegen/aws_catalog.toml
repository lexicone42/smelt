# ─── SQS: Queue ──────────────────────────────────────────────────────────────
# Pattern: queue_url as provider_id, get_queue_attributes, set_queue_attributes
# Read takes queue_url directly; create returns queue_url from response.
# Tags are inline key-value pairs on create_queue (not typed Tag structs).

[[resource]]
struct_name = "Queue"
sdk_crate = "aws-sdk-sqs"
sdk_client = "sqs"
type_path = "sqs.Queue"

crud_create = "create_queue"
crud_read = "get_queue_attributes"
crud_update = "set_queue_attributes"
crud_delete = "delete_queue"
aws_updatable = true

aws_client_field = "sqs_client"
aws_read_style = "get_attributes"
aws_id_param = "queue_url"
aws_id_source = "response_field"
aws_response_id_field = "queue_url"
aws_tag_style = "inline_kv"

[[resource.aws_outputs]]
name = "queue_url"
expression = "provider_id"

[[resource.aws_outputs]]
name = "queue_arn"
expression = "attrs.get(&aws_sdk_sqs::types::QueueAttributeName::QueueArn).cloned().unwrap_or_default()"

[[resource.fields]]
name = "name"
section = "identity"
type = "String"
required = true
description = "Queue name"
sdk_param = "queue_name"

[[resource.fields]]
name = "fifo"
section = "identity"
type = "Bool"
default = false
description = "FIFO queue"
aws_attr_key = "FifoQueue"

[[resource.fields]]
name = "delay_seconds"
section = "reliability"
type = "Integer"
default = 0
description = "Delivery delay in seconds (0–900)"
aws_attr_key = "DelaySeconds"

[[resource.fields]]
name = "message_retention_seconds"
section = "reliability"
type = "Integer"
default = 345600
description = "Message retention period in seconds (60–1209600)"
aws_attr_key = "MessageRetentionPeriod"

[[resource.fields]]
name = "visibility_timeout"
section = "reliability"
type = "Integer"
default = 30
description = "Visibility timeout in seconds (0–43200)"
aws_attr_key = "VisibilityTimeout"

# ─── KMS: Key ────────────────────────────────────────────────────────────────
# Pattern: key_id as provider_id, describe_key, schedule_key_deletion.
# Post-create alias created from identity.name via create_alias (baked into create fn).
# Tags use typed KMS Tag builder (tag_key / tag_value).

[[resource]]
struct_name = "KmsKey"
sdk_crate = "aws-sdk-kms"
sdk_client = "kms"
type_path = "kms.Key"

crud_create = "create_key"
crud_read = "describe_key"
crud_update = "update_key_description"
crud_delete = "schedule_key_deletion"
aws_updatable = true

aws_client_field = "kms_client"
aws_read_style = "get_single"
aws_response_accessor = "key_metadata"
aws_id_param = "key_id"
aws_id_source = "response_field"
aws_response_id_field = "key_id"
aws_tag_style = "typed_tags"

[[resource.aws_outputs]]
name = "key_id"
expression = "resource.key_id()"

[[resource.aws_outputs]]
name = "key_arn"
expression = "resource.arn().unwrap_or(\"\")"

[[resource.fields]]
name = "name"
section = "identity"
type = "String"
required = true
description = "Key alias (becomes alias/name if prefix absent)"

[[resource.fields]]
name = "description"
section = "identity"
type = "String"
description = "Key description"

[[resource.fields]]
name = "key_usage"
section = "security"
type = "Enum"
default = "ENCRYPT_DECRYPT"
description = "Key usage type"
aws_enum = true

[[resource.fields]]
name = "key_spec"
section = "security"
type = "Enum"
default = "SYMMETRIC_DEFAULT"
description = "Key material spec"
aws_enum = true

[[resource.fields]]
name = "key_policy"
section = "security"
type = "String"
description = "Key policy JSON document"

[[resource.fields]]
name = "enabled"
section = "security"
type = "Bool"
default = true
description = "Key enabled state"

# ─── SSM: Parameter ──────────────────────────────────────────────────────────
# Pattern: name as provider_id (config_name), put_parameter for both create and update.
# Tags applied post-create via add_tags_to_resource with ResourceTypeForTagging::Parameter.
# type and tier are SDK enum fields (aws_enum = true).

[[resource]]
struct_name = "Parameter"
sdk_crate = "aws-sdk-ssm"
sdk_client = "ssm"
type_path = "ssm.Parameter"

crud_create = "put_parameter"
crud_read = "get_parameter"
crud_update = "put_parameter"
crud_delete = "delete_parameter"
aws_updatable = true

aws_client_field = "ssm_client"
aws_read_style = "get_single"
aws_response_accessor = "parameter"
aws_id_param = "name"
aws_id_source = "config_name"
aws_tag_style = "post_create"

[[resource.aws_outputs]]
name = "parameter_name"
expression = "resource.name().unwrap_or(\"\")"

[[resource.aws_outputs]]
name = "parameter_arn"
expression = "resource.arn().unwrap_or(\"\")"

[[resource.fields]]
name = "name"
section = "identity"
type = "String"
required = true
description = "Parameter name (path-style recommended, e.g., /app/config/key)"

[[resource.fields]]
name = "description"
section = "identity"
type = "String"
description = "Parameter description"

[[resource.fields]]
name = "type"
section = "sizing"
type = "Enum"
default = "String"
description = "Parameter type"
aws_enum = true

[[resource.fields]]
name = "value"
section = "sizing"
type = "String"
required = true
description = "Parameter value"

[[resource.fields]]
name = "tier"
section = "sizing"
type = "Enum"
default = "Standard"
description = "Parameter tier (Standard or Advanced)"
aws_enum = true

# ─── Secrets Manager: Secret ─────────────────────────────────────────────────
# Pattern: arn as provider_id (response_field), describe_secret for read.
# Tags use typed Tag builder (key / value — note: different from KMS tag_key/tag_value).
# secret_string is sensitive; update also calls put_secret_value if provided.

[[resource]]
struct_name = "Secret"
sdk_crate = "aws-sdk-secretsmanager"
sdk_client = "secretsmanager"
type_path = "secretsmanager.Secret"

crud_create = "create_secret"
crud_read = "describe_secret"
crud_update = "update_secret"
crud_delete = "delete_secret"
aws_updatable = true

aws_client_field = "secretsmanager_client"
aws_read_style = "get_single"
aws_id_param = "secret_id"
aws_id_source = "response_field"
aws_response_id_field = "arn"
aws_tag_style = "typed_tags"
aws_tag_infallible = true

[[resource.aws_outputs]]
name = "secret_arn"
expression = "result.arn().unwrap_or(\"\")"

[[resource.aws_outputs]]
name = "secret_name"
expression = "result.name().unwrap_or(\"\")"

[[resource.fields]]
name = "name"
section = "identity"
type = "String"
required = true
description = "Secret name"

[[resource.fields]]
name = "description"
section = "identity"
type = "String"
description = "Secret description"

[[resource.fields]]
name = "secret_string"
section = "security"
type = "String"
description = "Secret string value (sensitive)"
sensitive = true

[[resource.fields]]
name = "kms_key_id"
section = "security"
type = "String"
description = "KMS key ID for encryption at rest"

