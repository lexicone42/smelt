# ─── KMS: Key ────────────────────────────────────────────────────────────────
# Uses escape hatches: aws_create_code (enum conversions + alias creation),
# aws_update_code (split update_key_description + enable/disable), aws_delete_code
# (schedule_key_deletion with 30-day window). KMS tags use tag_key/tag_value.

[[resource]]
struct_name = "Key"
sdk_crate = "aws-sdk-kms"
sdk_client = "kms"
type_path = "kms.Key"

crud_create = "create_key"
crud_read = "describe_key"
crud_update = "update_key_description"
crud_delete = "schedule_key_deletion"
aws_updatable = true

aws_client_field = "kms_client"
aws_read_style = "get_single"
aws_response_accessor = "key_metadata"
aws_id_param = "key_id"
aws_id_source = "response_field"
aws_response_id_field = "key_id"
aws_response_id_non_optional = true
aws_tag_style = "kms_tags"
skip_name_on_create = true

aws_create_code = """
let description = config.optional_str("/identity/description")
    .or_else(|| config.optional_str("/identity/name"))
    .unwrap_or("Managed by smelt");
let key_usage = config.str_or("/security/key_usage", "ENCRYPT_DECRYPT");
let key_spec = config.str_or("/security/key_spec", "SYMMETRIC_DEFAULT");

let mut req = self.kms_client
    .create_key()
    .description(description)
    .key_usage(aws_sdk_kms::types::KeyUsageType::from(key_usage))
    .key_spec(aws_sdk_kms::types::KeySpec::from(key_spec));

let tags = super::extract_tags(config);
for (k, v) in &tags {
    req = req.tags(
        aws_sdk_kms::types::Tag::builder()
            .tag_key(k)
            .tag_value(v)
            .build()
            .map_err(|e| ProviderError::InvalidConfig(format!("failed to build KMS Tag: {e}")))?
    );
}

if let Some(policy) = config.optional_str("/security/key_policy") {
    req = req.policy(policy);
}

let result = req.send().await
    .map_err(|e| ProviderError::ApiError(format!("create_key: {e}")))?;

let key = result.key_metadata()
    .ok_or_else(|| ProviderError::ApiError("CreateKey returned no metadata".into()))?;
let provider_id = key.key_id();

// Create alias if name is specified
if let Some(name) = config.optional_str("/identity/name") {
    let alias = if name.starts_with("alias/") {
        name.to_string()
    } else {
        format!("alias/{name}")
    };
    self.kms_client
        .create_alias()
        .alias_name(&alias)
        .target_key_id(provider_id)
        .send()
        .await
        .map_err(|e| ProviderError::ApiError(format!("create_alias: {e}")))?;
}
"""

aws_update_code = """
if let Some(desc) = config.optional_str("/identity/description") {
    self.kms_client
        .update_key_description()
        .key_id(provider_id)
        .description(desc)
        .send()
        .await
        .map_err(|e| ProviderError::ApiError(format!("update_key_description: {e}")))?;
}

if let Some(enabled) = config.optional_bool("/security/enabled") {
    if enabled {
        self.kms_client
            .enable_key()
            .key_id(provider_id)
            .send()
            .await
            .map_err(|e| ProviderError::ApiError(format!("enable_key: {e}")))?;
    } else {
        self.kms_client
            .disable_key()
            .key_id(provider_id)
            .send()
            .await
            .map_err(|e| ProviderError::ApiError(format!("disable_key: {e}")))?;
    }
}
"""

aws_delete_code = """
self.kms_client
    .schedule_key_deletion()
    .key_id(provider_id)
    .pending_window_in_days(30)
    .send()
    .await
    .map_err(|e| ProviderError::ApiError(format!("schedule_key_deletion: {e}")))?;
"""

[[resource.fields]]
name = "description"
section = "identity"
type = "String"
required = false
default_value = "Managed by smelt"
description = "Key description"

[[resource.fields]]
name = "name"
section = "identity"
type = "String"
required = true
description = "Key alias (becomes alias/name)"

[[resource.fields]]
name = "key_usage"
section = "security"
type = "Enum"
enum_values = ["ENCRYPT_DECRYPT", "SIGN_VERIFY", "GENERATE_VERIFY_MAC"]
required = false
default_value = "ENCRYPT_DECRYPT"
description = "Key usage type"
skip_create = true

[[resource.fields]]
name = "key_spec"
section = "security"
type = "Enum"
enum_values = ["SYMMETRIC_DEFAULT", "RSA_2048", "RSA_4096", "ECC_NIST_P256", "ECC_NIST_P384"]
required = false
default_value = "SYMMETRIC_DEFAULT"
description = "Key spec"
skip_create = true

[[resource.fields]]
name = "key_policy"
section = "security"
type = "String"
required = false
description = "Key policy JSON"
skip_create = true

[[resource.fields]]
name = "enabled"
section = "security"
type = "Bool"
required = false
default_value = "true"
description = "Key enabled state"
skip_create = true
read_expression = "resource.enabled()"

[[resource.aws_outputs]]
name = "key_id"
expression = "resource.key_id()"
non_optional = true

[[resource.aws_outputs]]
name = "key_arn"
expression = "resource.arn().unwrap_or(\"\")"

