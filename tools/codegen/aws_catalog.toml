# AWS Resource Catalog — declarative field definitions (no SDK introspection).
#
# Unlike the GCP catalog which introspects SDK model.rs files, the AWS catalog
# defines fields explicitly. This is because:
# 1. AWS SDK types live across many files in src/types/, not a single model.rs
# 2. AWS CRUD patterns are more diverse than GCP's 3 API styles
# 3. The hand-written schemas are already well-defined
#
# Usage:
#   cargo run -- aws-batch --catalog aws_catalog.toml --output-dir /tmp/aws-codegen

# ─── CloudWatch Logs: LogGroup ───────────────────────────────────────────────
# Pattern: name-get, set_tags, name as provider_id

[[resource]]
struct_name = "LogGroup"
sdk_crate = "aws-sdk-cloudwatchlogs"
sdk_client = "logs"
type_path = "logs.LogGroup"

crud_create = "create_log_group"
crud_read = "describe_log_groups"
crud_delete = "delete_log_group"

aws_client_field = "logs_client"
aws_read_style = "describe_list"
aws_list_accessor = "log_groups"
aws_id_param = "log_group_name"
aws_id_source = "config_name"
aws_tag_style = "set_tags"
aws_read_id_param = "log_group_name_prefix"

[[resource.aws_outputs]]
name = "log_group_arn"
expression = "resource.arn().unwrap_or(\"\")"

[[resource.aws_outputs]]
name = "log_group_name"
expression = "resource.log_group_name().unwrap_or(\"\")"

[[resource.fields]]
name = "name"
section = "identity"
type = "String"
required = true
description = "Log group name (e.g., /ecs/my-service)"
sdk_param = "log_group_name"

[[resource.fields]]
name = "retention_days"
section = "reliability"
type = "Integer"
default = 0
description = "Log retention in days (0 = never expire)"
sdk_param = "retention_in_days"
skip_create = true
aws_post_create_method = "put_retention_policy"

[[resource.fields]]
name = "kms_key_id"
section = "security"
type = "String"
description = "KMS key for encryption"

# ─── SNS: Topic ──────────────────────────────────────────────────────────────
# Pattern: arn-response, typed_tags, arn as provider_id

[[resource]]
struct_name = "Topic"
sdk_crate = "aws-sdk-sns"
sdk_client = "sns"
type_path = "sns.Topic"

crud_create = "create_topic"
crud_read = "get_topic_attributes"
crud_delete = "delete_topic"

aws_client_field = "sns_client"
aws_read_style = "get_attributes"
aws_id_param = "topic_arn"
aws_id_source = "response_field"
aws_response_id_field = "topic_arn"
aws_tag_style = "typed_tags"

[[resource.aws_outputs]]
name = "topic_arn"
expression = "provider_id"

[[resource.aws_outputs]]
name = "topic_name"
expression = "provider_id.rsplit(':').next().unwrap_or(\"\")"

[[resource.fields]]
name = "name"
section = "identity"
type = "String"
required = true
description = "Topic name"

[[resource.fields]]
name = "fifo"
section = "identity"
type = "Bool"
default = false
description = "FIFO topic"
aws_attr_key = "FifoTopic"

