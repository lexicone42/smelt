[[resource.aws_outputs]]
name = "vpc_endpoint_id"
expression = "provider_id"

[[resource.fields]]
name = "name"
section = "identity"
type = "String"
required = true
description = "Name tag for the VPC endpoint"
skip_create = true
read_expression = "super::extract_name_tag(resource.tags())"

[[resource.fields]]
name = "service_name"
section = "network"
type = "String"
required = true
description = "AWS service name (e.g., com.amazonaws.us-east-1.s3)"
skip_update = true

[[resource.fields]]
name = "vpc_id"
section = "network"
type = "String"
required = true
description = "VPC ID for the endpoint"
skip_update = true

[[resource.fields]]
name = "vpc_endpoint_type"
section = "network"
type = "String"
default = "Gateway"
description = "Endpoint type (Gateway or Interface)"
aws_enum = true
skip_update = true
skip_read = true

# ─── Lambda: EventSourceMapping ───────────────────────────────────────────
# Pattern: get_single, UUID-based ID from create response

[[resource]]
struct_name = "EventSourceMapping"
sdk_crate = "aws-sdk-lambda"
sdk_client = "lambda"
type_path = "lambda.EventSourceMapping"

crud_create = "create_event_source_mapping"
crud_read = "get_event_source_mapping"
crud_update = "update_event_source_mapping"
crud_delete = "delete_event_source_mapping"
aws_updatable = true

aws_client_field = "lambda_client"
aws_read_style = "get_single"
aws_id_param = "uuid"
aws_id_source = "response_field"
aws_response_id_field = "uuid"

[[resource.aws_outputs]]
name = "uuid"
expression = "provider_id"

[[resource.aws_outputs]]
name = "function_arn"
expression = "resource.function_arn().unwrap_or(\"\")"

[[resource.aws_outputs]]
name = "state"
expression = "resource.state().unwrap_or(\"\")"

[[resource.fields]]
name = "name"
section = "identity"
type = "String"
required = true
description = "Mapping identifier (used for smelt naming only)"
skip_create = true
skip_read = true

[[resource.fields]]
name = "event_source_arn"
section = "runtime"
type = "String"
required = true
description = "ARN of event source (SQS, Kinesis, DynamoDB stream, etc.)"
skip_update = true

[[resource.fields]]
name = "function_name"
section = "runtime"
type = "String"
required = true
description = "Lambda function name or ARN"
updatable = true

[[resource.fields]]
name = "enabled"
section = "runtime"
type = "Bool"
default = true
description = "Whether the mapping is enabled"
updatable = true
sdk_non_optional = true

[[resource.fields]]
name = "batch_size"
section = "sizing"
type = "Integer"
default = 10
description = "Maximum records per batch"
updatable = true
