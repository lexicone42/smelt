# ─── WAFv2: WebACL ──────────────────────────────────────────────────────────
# Uses escape hatches for all 4 CRUD operations:
#   - Composite provider_id: {acl_id}:{name}:{scope}
#   - DefaultAction conditional builder (allow vs block)
#   - VisibilityConfig mandatory nested builder
#   - lock_token required for update and delete

[[resource]]
struct_name = "WebACL"
sdk_crate = "aws-sdk-wafv2"
sdk_client = "wafv2"
type_path = "wafv2.WebACL"

crud_create = "create_web_acl"
crud_read = "get_web_acl"
crud_update = "update_web_acl"
crud_delete = "delete_web_acl"

aws_client_field = "wafv2_client"
aws_id_param = "id"
aws_id_source = "response_field"
aws_tag_style = "none"
aws_updatable = true

aws_create_code = """
let name = config.require_str("/identity/name")?.to_string();
let description = config.optional_str("/identity/description").unwrap_or("");
let scope = config.str_or("/network/scope", "REGIONAL");

let default_action_allow = config.str_or("/security/default_action", "allow") == "allow";

let default_action = if default_action_allow {
    aws_sdk_wafv2::types::DefaultAction::builder()
        .allow(aws_sdk_wafv2::types::AllowAction::builder().build())
        .build()
} else {
    aws_sdk_wafv2::types::DefaultAction::builder()
        .block(aws_sdk_wafv2::types::BlockAction::builder().build())
        .build()
};

let visibility_config = aws_sdk_wafv2::types::VisibilityConfig::builder()
    .sampled_requests_enabled(true)
    .cloud_watch_metrics_enabled(true)
    .metric_name(&name)
    .build()
    .map_err(|e| ProviderError::InvalidConfig(format!("failed to build VisibilityConfig: {e}")))?;

let result = self.wafv2_client
    .create_web_acl()
    .name(&name)
    .description(description)
    .scope(aws_sdk_wafv2::types::Scope::from(scope))
    .default_action(default_action)
    .visibility_config(visibility_config)
    .send()
    .await
    .map_err(|e| ProviderError::ApiError(format!("CreateWebACL: {e}")))?;

let summary = result.summary()
    .ok_or_else(|| ProviderError::ApiError("CreateWebACL returned no summary".into()))?;

let acl_id = summary.id().unwrap_or("");
let provider_id = &format!("{acl_id}:{name}:{scope}");
"""

aws_read_code = """
let parts: Vec<&str> = provider_id.splitn(3, ':').collect();
if parts.len() != 3 {
    return Err(ProviderError::InvalidConfig(
        "WebACL provider_id must be id:name:scope".into(),
    ));
}
let (acl_id, name, scope) = (parts[0], parts[1], parts[2]);

let result = self.wafv2_client
    .get_web_acl()
    .id(acl_id)
    .name(name)
    .scope(aws_sdk_wafv2::types::Scope::from(scope))
    .send()
    .await
    .map_err(|e| ProviderError::ApiError(format!("GetWebACL: {e}")))?;

let acl = result.web_acl()
    .ok_or_else(|| ProviderError::NotFound(format!("WebACL {provider_id}")))?;

let state = serde_json::json!({
    "identity": {
        "name": acl.name(),
        "description": acl.description().unwrap_or(""),
    },
    "network": {
        "scope": scope,
    },
    "security": {
        "capacity": acl.capacity(),
        "rule_count": acl.rules().len(),
    }
});

let mut outputs = HashMap::new();
outputs.insert("web_acl_id".into(), serde_json::json!(acl.id()));
outputs.insert("web_acl_arn".into(), serde_json::json!(acl.arn()));

Ok(ResourceOutput {
    provider_id: provider_id.to_string(),
    state,
    outputs,
})
"""

aws_update_code = """
let parts: Vec<&str> = provider_id.splitn(3, ':').collect();
if parts.len() != 3 {
    return Err(ProviderError::InvalidConfig(
        "WebACL provider_id must be id:name:scope".into(),
    ));
}
let (acl_id, name, scope) = (parts[0], parts[1], parts[2]);

// Need lock_token for updates
let get = self.wafv2_client
    .get_web_acl()
    .id(acl_id)
    .name(name)
    .scope(aws_sdk_wafv2::types::Scope::from(scope))
    .send()
    .await
    .map_err(|e| ProviderError::ApiError(format!("GetWebACL: {e}")))?;

let lock_token = get.lock_token()
    .ok_or_else(|| ProviderError::ApiError("GetWebACL returned no lock_token".into()))?
    .to_string();
let acl = get.web_acl()
    .ok_or_else(|| ProviderError::NotFound(format!("WebACL {provider_id}")))?;

let description = config.optional_str("/identity/description")
    .unwrap_or(acl.description().unwrap_or(""));

let default_action_allow = config.str_or("/security/default_action", "allow") == "allow";

let default_action = if default_action_allow {
    aws_sdk_wafv2::types::DefaultAction::builder()
        .allow(aws_sdk_wafv2::types::AllowAction::builder().build())
        .build()
} else {
    aws_sdk_wafv2::types::DefaultAction::builder()
        .block(aws_sdk_wafv2::types::BlockAction::builder().build())
        .build()
};

let visibility_config = aws_sdk_wafv2::types::VisibilityConfig::builder()
    .sampled_requests_enabled(true)
    .cloud_watch_metrics_enabled(true)
    .metric_name(name)
    .build()
    .map_err(|e| ProviderError::InvalidConfig(format!("failed to build VisibilityConfig: {e}")))?;

self.wafv2_client
    .update_web_acl()
    .id(acl_id)
    .name(name)
    .scope(aws_sdk_wafv2::types::Scope::from(scope))
    .lock_token(&lock_token)
    .description(description)
    .default_action(default_action)
    .visibility_config(visibility_config)
    .send()
    .await
    .map_err(|e| ProviderError::ApiError(format!("UpdateWebACL: {e}")))?;
