# ─── S3: Bucket ──────────────────────────────────────────────────────────────
# Uses escape hatches for all 4 CRUD operations:
#   - Multi-step post-create: put_bucket_versioning, put_bucket_encryption, put_bucket_tagging
#   - Read: head_bucket + get_bucket_versioning (2 API calls)
#   - Update: put_bucket_versioning (separate API, not standard update)

[[resource]]
struct_name = "Bucket"
sdk_crate = "aws-sdk-s3"
sdk_client = "s3"
type_path = "s3.Bucket"

crud_create = "create_bucket"
crud_read = "head_bucket"
crud_update = "put_bucket_versioning"
crud_delete = "delete_bucket"

aws_client_field = "s3_client"
aws_id_param = "bucket"
aws_id_source = "config_name"
aws_tag_style = "none"
aws_updatable = true

aws_create_code = """
let name = config.require_str("/identity/name")?.to_string();

self.s3_client
    .create_bucket()
    .bucket(&name)
    .send()
    .await
    .map_err(|e| ProviderError::ApiError(format!("CreateBucket: {e}")))?;

// Enable versioning if requested
if config
    .pointer("/reliability/versioning")
    .and_then(|v| v.as_bool())
    .unwrap_or(false)
{
    self.s3_client
        .put_bucket_versioning()
        .bucket(&name)
        .versioning_configuration(
            aws_sdk_s3::types::VersioningConfiguration::builder()
                .status(aws_sdk_s3::types::BucketVersioningStatus::Enabled)
                .build(),
        )
        .send()
        .await
        .map_err(|e| ProviderError::ApiError(format!("PutBucketVersioning: {e}")))?;
}

// Set encryption
if let Some(algo) = config.optional_str("/security/encryption") {
    let sse = match algo {
        "AES256" => aws_sdk_s3::types::ServerSideEncryption::Aes256,
        _ => aws_sdk_s3::types::ServerSideEncryption::AwsKms,
    };
    self.s3_client
        .put_bucket_encryption()
        .bucket(&name)
        .server_side_encryption_configuration(
            aws_sdk_s3::types::ServerSideEncryptionConfiguration::builder()
                .rules(
                    aws_sdk_s3::types::ServerSideEncryptionRule::builder()
                        .apply_server_side_encryption_by_default(
                            aws_sdk_s3::types::ServerSideEncryptionByDefault::builder()
                                .sse_algorithm(sse)
                                .build()
                                .map_err(|e| ProviderError::InvalidConfig(format!("failed to build ServerSideEncryptionByDefault: {e}")))?,
                        )
                        .build(),
                )
                .build()
                .map_err(|e| ProviderError::InvalidConfig(format!("failed to build ServerSideEncryptionConfiguration: {e}")))?,
        )
        .send()
        .await
        .map_err(|e| ProviderError::ApiError(format!("PutBucketEncryption: {e}")))?;
}

// Tags
let tags = super::extract_tags(config);
if !tags.is_empty() {
    let tag_set: Vec<aws_sdk_s3::types::Tag> = tags
        .iter()
        .map(|(k, v)| {
            aws_sdk_s3::types::Tag::builder()
                .key(k)
                .value(v)
                .build()
                .map_err(|e| ProviderError::InvalidConfig(format!("failed to build S3 Tag: {e}")))
        })
        .collect::<Result<Vec<_>, _>>()?;
    self.s3_client
        .put_bucket_tagging()
        .bucket(&name)
        .tagging(
            aws_sdk_s3::types::Tagging::builder()
                .set_tag_set(Some(tag_set))
                .build()
                .map_err(|e| ProviderError::InvalidConfig(format!("failed to build Tagging: {e}")))?,
        )
        .send()
        .await
        .map_err(|e| ProviderError::ApiError(format!("PutBucketTagging: {e}")))?;
}

let provider_id = &name;
"""

aws_read_code = """
// Verify bucket exists
self.s3_client
    .head_bucket()
    .bucket(provider_id)
    .send()
    .await
    .map_err(|e| ProviderError::ApiError(format!("HeadBucket: {e}")))?;

let mut versioning = false;
if let Ok(v) = self.s3_client
    .get_bucket_versioning()
    .bucket(provider_id)
    .send()
    .await
{
    versioning = v.status() == Some(&aws_sdk_s3::types::BucketVersioningStatus::Enabled);
}

let state = serde_json::json!({
    "identity": { "name": provider_id },
    "reliability": { "versioning": versioning },
});

let mut outputs = HashMap::new();
outputs.insert("bucket_name".into(), serde_json::json!(provider_id));
outputs.insert("bucket_arn".into(), serde_json::json!(format!("arn:aws:s3:::{provider_id}")));

Ok(ResourceOutput {
    provider_id: provider_id.to_string(),
    state,
    outputs,
})
"""

aws_update_code = """
if let Some(v) = config
    .pointer("/reliability/versioning")
    .and_then(|v| v.as_bool())
{
    let status = if v {
        aws_sdk_s3::types::BucketVersioningStatus::Enabled
    } else {
        aws_sdk_s3::types::BucketVersioningStatus::Suspended
    };
    self.s3_client
        .put_bucket_versioning()
        .bucket(provider_id)
        .versioning_configuration(
            aws_sdk_s3::types::VersioningConfiguration::builder()
                .status(status)
                .build(),
        )
        .send()
        .await
        .map_err(|e| ProviderError::ApiError(format!("PutBucketVersioning: {e}")))?;
}
"""

aws_delete_code = """
self.s3_client
    .delete_bucket()
    .bucket(provider_id)
    .send()
    .await
    .map_err(|e| ProviderError::ApiError(format!("DeleteBucket: {e}")))?;
"""

