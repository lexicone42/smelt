aws_delete_code = """
let parts: Vec<&str> = provider_id.splitn(3, ':').collect();
if parts.len() != 3 {
    return Err(ProviderError::InvalidConfig(
        "WebACL provider_id must be id:name:scope".into(),
    ));
}
let (acl_id, name, scope) = (parts[0], parts[1], parts[2]);

let get = self.wafv2_client
    .get_web_acl()
