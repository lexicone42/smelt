# ─── AutoScaling: Group ──────────────────────────────────────────────────────
# Uses escape hatches for all 4 CRUD operations:
#   - subnet_ids joined with comma for vpc_zone_identifier
#   - LaunchTemplateSpecification builder group
#   - Custom tag builder (resource_id, resource_type, propagate_at_launch)
#   - force_delete(true) on delete

[[resource]]
struct_name = "AutoScalingGroup"
sdk_crate = "aws-sdk-autoscaling"
sdk_client = "autoscaling"
type_path = "autoscaling.Group"

crud_create = "create_auto_scaling_group"
crud_read = "describe_auto_scaling_groups"
crud_update = "update_auto_scaling_group"
crud_delete = "delete_auto_scaling_group"

aws_client_field = "autoscaling_client"
aws_id_param = "auto_scaling_group_name"
aws_id_source = "config_name"
aws_tag_style = "none"
aws_updatable = true

aws_create_code = """
let name = config.require_str("/identity/name")?.to_string();

let min_size = config
    .pointer("/sizing/min_size")
    .and_then(|v| v.as_i64())
    .unwrap_or(1) as i32;

let max_size = config
    .pointer("/sizing/max_size")
    .and_then(|v| v.as_i64())
    .unwrap_or(1) as i32;

let desired_capacity = config
    .pointer("/sizing/desired_capacity")
    .and_then(|v| v.as_i64())
    .unwrap_or(1) as i32;

let health_check_type = config.str_or("/reliability/health_check_type", "EC2");

let health_check_grace_period = config
    .pointer("/reliability/health_check_grace_period")
    .and_then(|v| v.as_i64())
    .unwrap_or(300) as i32;

// Subnet IDs — join with comma for vpc_zone_identifier
let subnet_ids_joined = config
    .pointer("/network/subnet_ids")
    .and_then(|v| v.as_array())
    .map(|arr| arr.iter().filter_map(|s| s.as_str()).collect::<Vec<_>>().join(","))
    .unwrap_or_default();

let mut req = self.autoscaling_client
    .create_auto_scaling_group()
    .auto_scaling_group_name(&name)
    .min_size(min_size)
    .max_size(max_size)
    .desired_capacity(desired_capacity)
    .vpc_zone_identifier(&subnet_ids_joined)
    .health_check_type(health_check_type)
    .health_check_grace_period(health_check_grace_period);

// Launch template
if let Some(lt_id) = config.optional_str("/sizing/launch_template_id") {
    let lt_version = config.str_or("/sizing/launch_template_version", "$Default");
    req = req.launch_template(
        aws_sdk_autoscaling::types::LaunchTemplateSpecification::builder()
            .launch_template_id(lt_id)
            .version(lt_version)
            .build(),
    );
}

// Tags
let tags = super::extract_tags(config);
for (k, v) in &tags {
    req = req.tags(
        aws_sdk_autoscaling::types::Tag::builder()
            .key(k)
            .value(v)
            .resource_id(&name)
            .resource_type("auto-scaling-group")
            .propagate_at_launch(true)
            .build(),
    );
}

req.send().await
    .map_err(|e| ProviderError::ApiError(format!("CreateAutoScalingGroup: {e}")))?;

let provider_id = &name;
"""

aws_read_code = """
let result = self.autoscaling_client
    .describe_auto_scaling_groups()
    .auto_scaling_group_names(provider_id)
    .send()
    .await
    .map_err(|e| ProviderError::ApiError(format!("DescribeAutoScalingGroups: {e}")))?;

let asg = result.auto_scaling_groups()
    .first()
    .ok_or_else(|| ProviderError::NotFound(format!("AutoScalingGroup {provider_id}")))?;

let availability_zones: Vec<&str> = asg.availability_zones()
    .iter()
    .map(|s| s.as_str())
    .collect();

let state = serde_json::json!({
    "identity": {
        "name": asg.auto_scaling_group_name(),
    },
    "sizing": {
        "min_size": asg.min_size(),
        "max_size": asg.max_size(),
        "desired_capacity": asg.desired_capacity(),
    },
    "network": {
        "vpc_zone_identifier": asg.vpc_zone_identifier().unwrap_or(""),
        "availability_zones": availability_zones,
    },
    "reliability": {
        "health_check_type": asg.health_check_type().unwrap_or(""),
        "health_check_grace_period": asg.health_check_grace_period(),
    }
});

let mut outputs = HashMap::new();
outputs.insert("asg_arn".into(), serde_json::json!(asg.auto_scaling_group_arn().unwrap_or("")));
outputs.insert("asg_name".into(), serde_json::json!(asg.auto_scaling_group_name()));

Ok(ResourceOutput {
    provider_id: provider_id.to_string(),
    state,
    outputs,
})
"""

aws_update_code = """
let min_size = config
    .pointer("/sizing/min_size")
    .and_then(|v| v.as_i64())
    .unwrap_or(1) as i32;

let max_size = config
    .pointer("/sizing/max_size")
    .and_then(|v| v.as_i64())
    .unwrap_or(1) as i32;

let desired_capacity = config
    .pointer("/sizing/desired_capacity")
    .and_then(|v| v.as_i64())
    .unwrap_or(1) as i32;

let health_check_type = config.optional_str("/reliability/health_check_type")
    .map(|s| s.to_string());

let health_check_grace_period = config
    .pointer("/reliability/health_check_grace_period")
    .and_then(|v| v.as_i64())
    .map(|v| v as i32);

self.autoscaling_client
    .update_auto_scaling_group()
    .auto_scaling_group_name(provider_id)
    .min_size(min_size)
    .max_size(max_size)
    .desired_capacity(desired_capacity)
    .set_health_check_type(health_check_type)
    .set_health_check_grace_period(health_check_grace_period)
    .send()
    .await
    .map_err(|e| ProviderError::ApiError(format!("UpdateAutoScalingGroup: {e}")))?;
"""

aws_delete_code = """
self.autoscaling_client
    .delete_auto_scaling_group()
    .auto_scaling_group_name(provider_id)
    .force_delete(true)
    .send()
    .await
    .map_err(|e| ProviderError::ApiError(format!("DeleteAutoScalingGroup: {e}")))?;
"""

