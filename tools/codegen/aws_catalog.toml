# ─── IAM: Role ──────────────────────────────────────────────────────────────
# Uses escape hatches for all 4 CRUD operations:
#   - Create: attach_role_policy loop for managed_policy_arns
#   - Read: get_role, assume_role_policy_document accessor
#   - Update: split across update_assume_role_policy + update_role (2 APIs)
#   - Delete: list_attached_role_policies + detach each, list_role_policies + delete each

[[resource]]
struct_name = "Role"
sdk_crate = "aws-sdk-iam"
sdk_client = "iam"
type_path = "iam.Role"

crud_create = "create_role"
crud_read = "get_role"
crud_update = "update_role"
crud_delete = "delete_role"

aws_client_field = "iam_client"
aws_id_param = "role_name"
aws_id_source = "config_name"
aws_tag_style = "none"

aws_create_code = """
let name = config.require_str("/identity/name")?.to_string();

let assume_role_policy = config
    .pointer("/security/assume_role_policy")
    .ok_or_else(|| ProviderError::InvalidConfig("security.assume_role_policy is required".into()))?;

let policy_doc = if assume_role_policy.is_string() {
    assume_role_policy.as_str()
        .ok_or_else(|| ProviderError::InvalidConfig("assume_role_policy is not a valid string".into()))?
        .to_string()
} else {
    serde_json::to_string(assume_role_policy)
        .map_err(|e| ProviderError::InvalidConfig(format!("invalid policy JSON: {e}")))?
};

let description = config.optional_str("/identity/description").unwrap_or("");

let mut req = self.iam_client
    .create_role()
    .role_name(&name)
    .assume_role_policy_document(&policy_doc);

if !description.is_empty() {
    req = req.description(description);
}

if let Some(path) = config.optional_str("/identity/path") {
    req = req.path(path);
}

let tags = super::extract_tags(config);
for (k, v) in &tags {
    req = req.tags(
        aws_sdk_iam::types::Tag::builder()
            .key(k)
            .value(v)
            .build()
            .map_err(|e| ProviderError::InvalidConfig(format!("failed to build IAM Tag: {e}")))?,
    );
}

req.send().await
    .map_err(|e| ProviderError::ApiError(format!("CreateRole: {e}")))?;

// Attach managed policies if specified
if let Some(policies) = config
    .pointer("/security/managed_policy_arns")
    .and_then(|v| v.as_array())
{
    for arn in policies {
        if let Some(arn_str) = arn.as_str() {
            self.iam_client
                .attach_role_policy()
                .role_name(&name)
                .policy_arn(arn_str)
                .send()
                .await
                .map_err(|e| ProviderError::ApiError(format!("AttachRolePolicy: {e}")))?;
        }
    }
}

let provider_id = &name;
"""

aws_read_code = """
let result = self.iam_client
    .get_role()
    .role_name(provider_id)
    .send()
    .await
    .map_err(|e| ProviderError::ApiError(format!("GetRole: {e}")))?;

let role = result
    .role()
    .ok_or_else(|| ProviderError::NotFound(format!("Role {provider_id}")))?;

let state = serde_json::json!({
    "identity": {
        "name": role.role_name(),
        "description": role.description().unwrap_or(""),
        "path": role.path(),
    },
    "security": {
        "assume_role_policy": role.assume_role_policy_document().unwrap_or(""),
    }
});

let mut outputs = HashMap::new();
outputs.insert("role_arn".into(), serde_json::json!(role.arn()));
outputs.insert("role_name".into(), serde_json::json!(role.role_name()));
outputs.insert("role_id".into(), serde_json::json!(role.role_id()));

Ok(ResourceOutput {
    provider_id: provider_id.to_string(),
    state,
    outputs,
})
"""

aws_update_code = """
if let Some(policy) = config.pointer("/security/assume_role_policy") {
    let doc = if policy.is_string() {
        policy.as_str()
            .ok_or_else(|| ProviderError::InvalidConfig("assume_role_policy is not a valid string".into()))?
            .to_string()
    } else {
        serde_json::to_string(policy).unwrap_or_default()
    };
    self.iam_client
        .update_assume_role_policy()
        .role_name(provider_id)
        .policy_document(&doc)
        .send()
        .await
        .map_err(|e| ProviderError::ApiError(format!("UpdateAssumeRolePolicy: {e}")))?;
}
if let Some(desc) = config.optional_str("/identity/description") {
    self.iam_client
        .update_role()
        .role_name(provider_id)
        .description(desc)
        .send()
        .await
        .map_err(|e| ProviderError::ApiError(format!("UpdateRole: {e}")))?;
}
"""

aws_delete_code = """
// Detach all managed policies first
let policies = self.iam_client
    .list_attached_role_policies()
    .role_name(provider_id)
    .send()
    .await
    .map_err(|e| ProviderError::ApiError(format!("ListAttachedRolePolicies: {e}")))?;

for p in policies.attached_policies() {
    if let Some(arn) = p.policy_arn() {
        self.iam_client
            .detach_role_policy()
            .role_name(provider_id)
            .policy_arn(arn)
            .send()
            .await
            .map_err(|e| ProviderError::ApiError(format!("DetachRolePolicy: {e}")))?;
    }
}

// Delete inline policies
let inline = self.iam_client
    .list_role_policies()
    .role_name(provider_id)
    .send()
    .await
    .map_err(|e| ProviderError::ApiError(format!("ListRolePolicies: {e}")))?;

for name in inline.policy_names() {
    self.iam_client
        .delete_role_policy()
        .role_name(provider_id)
        .policy_name(name)
        .send()
        .await
        .map_err(|e| ProviderError::ApiError(format!("DeleteRolePolicy: {e}")))?;
}

self.iam_client
    .delete_role()
    .role_name(provider_id)
    .send()
    .await
    .map_err(|e| ProviderError::ApiError(format!("DeleteRole: {e}")))?;
"""

[[resource.fields]]
name = "name"
section = "identity"
type = "String"
required = true
description = "Role name"

[[resource.fields]]
name = "description"
section = "identity"
type = "String"
description = "Role description"
skip_create = true
skip_read = true

[[resource.fields]]
name = "path"
section = "identity"
type = "String"
description = "IAM path"
default = "/"
skip_create = true
skip_read = true

[[resource.fields]]
name = "assume_role_policy"
section = "security"
type = "String"
required = true
description = "Trust policy document (JSON)"
skip_create = true
skip_read = true

[[resource.fields]]
name = "managed_policy_arns"
section = "security"
type = "StringArray"
description = "Managed policy ARNs to attach"
default = []
skip_create = true
skip_read = true

[[resource.aws_outputs]]
name = "role_arn"
expression = "role.arn()"

[[resource.aws_outputs]]
name = "role_name"
expression = "role.role_name()"

[[resource.aws_outputs]]
name = "role_id"
expression = "role.role_id()"
#   - path() returns &str (non-optional) — codegen emits unwrap_or("") which won't compile

# ─── IAM: InstanceProfile ──────────────────────────────────────────────────
# Uses escape hatches: aws_post_create_code (role attachment),
# aws_delete_code (remove roles then delete). path() is non-optional.

[[resource]]
struct_name = "InstanceProfile"
sdk_crate = "aws-sdk-iam"
sdk_client = "iam"
type_path = "iam.InstanceProfile"

crud_create = "create_instance_profile"
crud_read = "get_instance_profile"
crud_delete = "delete_instance_profile"

aws_client_field = "iam_client"
aws_read_style = "get_single"
aws_response_accessor = "instance_profile"
aws_id_param = "instance_profile_name"
aws_id_source = "config_name"
aws_tag_style = "none"

aws_create_code = """
let name = config.require_str("/identity/name")?.to_string();

let mut req = self.iam_client
    .create_instance_profile()
    .instance_profile_name(&name);

if let Some(path) = config.optional_str("/identity/path") {
    req = req.path(path);
}

req.send().await
    .map_err(|e| ProviderError::ApiError(format!("create_instance_profile: {e}")))?;

// Add role if specified
if let Some(role_name) = config.optional_str("/security/role_name") {
    self.iam_client
        .add_role_to_instance_profile()
        .instance_profile_name(&name)
        .role_name(role_name)
        .send()
        .await
        .map_err(|e| ProviderError::ApiError(format!("add_role_to_instance_profile: {e}")))?;
}

let provider_id = &name;
"""

aws_delete_code = """
// Remove all attached roles before deletion
let result = self.iam_client
    .get_instance_profile()
    .instance_profile_name(provider_id)
    .send()
    .await
    .map_err(|e| ProviderError::ApiError(format!("get_instance_profile: {e}")))?;

if let Some(ip) = result.instance_profile() {
    for role in ip.roles() {
        self.iam_client
            .remove_role_from_instance_profile()
            .instance_profile_name(provider_id)
            .role_name(role.role_name())
            .send()
            .await
            .map_err(|e| ProviderError::ApiError(format!("remove_role_from_instance_profile: {e}")))?;
    }
}

self.iam_client
    .delete_instance_profile()
    .instance_profile_name(provider_id)
    .send()
    .await
    .map_err(|e| ProviderError::ApiError(format!("delete_instance_profile: {e}")))?;
"""

