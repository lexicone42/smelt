# GCP Resource Catalog for smelt-codegen batch generation.
# Each [[resource]] entry maps a GCP SDK struct to its smelt resource type.
#
# Phase 1: Compute resources (standard pattern) + select resource_name APIs
# Phase 2 (TODO): DNS, SQL, Container, IAM, Monitoring, Logging (require API-specific codegen)

# ─── Compute ────────────────────────────────────────────────────────────────

[[resource]]
struct_name = "Network"
sdk_crate = "google-cloud-compute-v1"
sdk_client = "Networks"
api_style = "compute"
scope = "global"

[[resource]]
struct_name = "Subnetwork"
sdk_crate = "google-cloud-compute-v1"
sdk_client = "Subnetworks"
api_style = "compute"
scope = "regional"

[[resource]]
struct_name = "Firewall"
sdk_crate = "google-cloud-compute-v1"
sdk_client = "Firewalls"
api_style = "compute"
scope = "global"

[[resource]]
struct_name = "Address"
sdk_crate = "google-cloud-compute-v1"
sdk_client = "Addresses"
api_style = "compute"
scope = "regional"
# Addresses cannot be updated — only created/deleted
crud_update = ""

[[resource]]
struct_name = "Disk"
sdk_crate = "google-cloud-compute-v1"
sdk_client = "Disks"
api_style = "compute"
scope = "zonal"
crud_update = "update"

[[resource]]
struct_name = "Instance"
sdk_crate = "google-cloud-compute-v1"
