# ─── IAM ────────────────────────────────────────────────────────────────────

[[resource]]
struct_name = "ServiceAccount"
sdk_crate = "google-cloud-iam-admin-v1"
sdk_client = "IAM"
client_accessor = "iam"
type_path = "iam.ServiceAccount"
api_style = "resource_name"
scope = "global"
parent_format = "projects/{project}"
resource_noun = "serviceAccounts"
# IAM create_service_account uses set_name for parent, not set_parent
parent_setter = "set_name"
resource_id_setter = "set_account_id"
resource_body_setter = "set_service_account"
crud_create = "create_service_account"
crud_read = "get_service_account"
crud_update = "patch_service_account"
crud_delete = "delete_service_account"
# GCP rejects service_account.name on create — server-assigned
skip_name_on_create = true

[[resource]]
struct_name = "Role"
sdk_crate = "google-cloud-iam-admin-v1"
sdk_client = "IAM"
client_accessor = "iam"
type_path = "iam.Role"
api_style = "resource_name"
scope = "global"
parent_format = "projects/{project}"
resource_id_setter = "set_role_id"
resource_body_setter = "set_role"
crud_create = "create_role"
crud_read = "get_role"
crud_update = "update_role"
crud_delete = "delete_role"

