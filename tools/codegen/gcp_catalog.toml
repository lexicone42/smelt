# ─── Secret Manager ─────────────────────────────────────────────────────────

[[resource]]
struct_name = "Secret"
sdk_crate = "google-cloud-secretmanager-v1"
sdk_client = "SecretManagerService"
client_accessor = "secretmanager"
api_style = "resource_name"
scope = "global"
parent_format = "projects/{project}"
resource_id_setter = "set_secret_id"
resource_body_setter = "set_secret"
crud_create = "create_secret"
crud_read = "get_secret"
crud_update = "update_secret"
crud_delete = "delete_secret"

# ─── Cloud Run ───────────────────────────────────────────────────────────────

[[resource]]
struct_name = "Service"
sdk_crate = "google-cloud-run-v2"
sdk_client = "Services"
client_accessor = "run_services"
type_path = "run.Service"
api_style = "resource_name"
scope = "regional"
parent_format = "projects/{project}/locations/{location}"
resource_body_setter = "set_service"
crud_create = "create_service"
crud_read = "get_service"
# Cloud Run uses with_request() pattern for updates, not individual setters
crud_update = ""
crud_delete = "delete_service"

[[resource]]
struct_name = "Job"
sdk_crate = "google-cloud-run-v2"
sdk_client = "Jobs"
client_accessor = "run_jobs"
type_path = "run.Job"
api_style = "resource_name"
scope = "regional"
parent_format = "projects/{project}/locations/{location}"
resource_body_setter = "set_job"
crud_create = "create_job"
crud_read = "get_job"
# Cloud Run uses with_request() pattern for updates, not individual setters
crud_update = ""
crud_delete = "delete_job"

# ─── Cloud Functions ─────────────────────────────────────────────────────────

[[resource]]
struct_name = "Function"
sdk_crate = "google-cloud-functions-v2"
sdk_client = "FunctionService"
client_accessor = "functions"
api_style = "resource_name"
scope = "regional"
parent_format = "projects/{project}/locations/{location}"
resource_body_setter = "set_function"
resource_id_setter = "set_function_id"
crud_create = "create_function"
crud_read = "get_function"
crud_update = "update_function"
crud_delete = "delete_function"

# ─── Cloud KMS ───────────────────────────────────────────────────────────────

[[resource]]
struct_name = "KeyRing"
sdk_crate = "google-cloud-kms-v1"
sdk_client = "KeyManagementService"
client_accessor = "kms"
api_style = "resource_name"
scope = "regional"
parent_format = "projects/{project}/locations/{location}"
resource_id_setter = "set_key_ring_id"
resource_body_setter = "set_key_ring"
crud_create = "create_key_ring"
crud_read = "get_key_ring"
# KeyRings cannot be updated or deleted
crud_update = ""
crud_delete = ""

[[resource]]
struct_name = "CryptoKey"
sdk_crate = "google-cloud-kms-v1"
sdk_client = "KeyManagementService"
client_accessor = "kms"
api_style = "resource_name"
scope = "regional"
parent_format = "projects/{project}/locations/{location}/keyRings/{parent_resource}"
resource_id_setter = "set_crypto_key_id"
resource_body_setter = "set_crypto_key"
crud_create = "create_crypto_key"
crud_read = "get_crypto_key"
crud_update = "update_crypto_key"
crud_delete = "destroy_crypto_key_version"

# ─── Logging (LogBucket only — standard set_parent pattern) ──────────────────

[[resource]]
struct_name = "LogBucket"
sdk_crate = "google-cloud-logging-v2"
sdk_client = "ConfigServiceV2"
client_accessor = "logging"
api_style = "resource_name"
scope = "regional"
parent_format = "projects/{project}/locations/{location}"
resource_body_setter = "set_bucket"
resource_id_setter = "set_bucket_id"
crud_create = "create_bucket"
crud_read = "get_bucket"
crud_update = "update_bucket"
crud_delete = "delete_bucket"

