resource_noun = "uptimeCheckConfigs"
resource_id_setter = ""
resource_body_setter = "set_uptime_check_config"
crud_create = "create_uptime_check_config"
crud_read = "get_uptime_check_config"
crud_update = "update_uptime_check_config"
crud_delete = "delete_uptime_check_config"
# GCP rejects name on create — server-assigned check ID
skip_name_on_create = true

[[resource]]
struct_name = "Group"
sdk_crate = "google-cloud-monitoring-v3"
sdk_client = "GroupService"
client_accessor = "monitoring_groups"
type_path = "monitoring.Group"
api_style = "resource_name"
scope = "global"
parent_format = "projects/{project}"
parent_setter = "set_name"
resource_id_setter = ""
resource_body_setter = "set_group"
# UpdateGroup doesn't support update_mask
has_update_mask = false
crud_create = "create_group"
crud_read = "get_group"
crud_update = "update_group"
crud_delete = "delete_group"

