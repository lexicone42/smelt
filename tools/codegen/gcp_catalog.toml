sdk_client = "AlertPolicyService"
client_accessor = "monitoring"
type_path = "monitoring.AlertPolicy"
api_style = "resource_name"
scope = "global"
parent_format = "projects/{project}"
resource_noun = "alertPolicies"
parent_setter = "set_name"
resource_id_setter = ""
resource_body_setter = "set_alert_policy"
crud_create = "create_alert_policy"
crud_read = "get_alert_policy"
crud_update = "update_alert_policy"
crud_delete = "delete_alert_policy"

[[resource]]
struct_name = "NotificationChannel"
sdk_crate = "google-cloud-monitoring-v3"
sdk_client = "NotificationChannelService"
client_accessor = "notification_channels"
type_path = "monitoring.NotificationChannel"
api_style = "resource_name"
scope = "global"
parent_format = "projects/{project}"
resource_noun = "notificationChannels"
parent_setter = "set_name"
resource_id_setter = ""
resource_body_setter = "set_notification_channel"
crud_create = "create_notification_channel"
crud_read = "get_notification_channel"
crud_update = "update_notification_channel"
crud_delete = "delete_notification_channel"
# GCP rejects name on create — server-assigned channel ID
skip_name_on_create = true
# Labels are channel-type-specific config (e.g., email_address), NOT user metadata
raw_labels = true
# "type" field (e.g. "email") is an identity property, not config
field_sections = { type = "identity" }

[[resource]]
struct_name = "UptimeCheckConfig"
sdk_crate = "google-cloud-monitoring-v3"
sdk_client = "UptimeCheckService"
