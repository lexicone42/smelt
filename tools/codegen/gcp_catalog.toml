# ─── Secret Manager ─────────────────────────────────────────────────────────

[[resource]]
struct_name = "Secret"
sdk_crate = "google-cloud-secretmanager-v1"
sdk_client = "SecretManagerService"
client_accessor = "secretmanager"
api_style = "resource_name"
scope = "global"
parent_format = "projects/{project}"
resource_id_setter = "set_secret_id"
resource_body_setter = "set_secret"
crud_create = "create_secret"
crud_read = "get_secret"
crud_update = "update_secret"
crud_delete = "delete_secret"

[[resource]]
struct_name = "SecretVersion"
sdk_crate = "google-cloud-secretmanager-v1"
