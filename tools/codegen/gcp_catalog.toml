# ─── Skipped resources (require non-standard patterns) ──────────────────────
# - FirewallPolicy — org-level, no set_project (different scope model)
# - IAM ServiceAccountKey — create doesn't take a body
# - SecretVersion — uses add_secret_version, non-standard lifecycle
# - Service Directory Endpoint — needs both namespace + service parent refs
# - Cloud Build BuildTrigger — non-standard project_id/trigger_id API
# - VPC Access Connector — no update method
# - Spanner Database — non-standard create (DDL), delete is drop_database
# - Private CA Certificate — needs both caPool + certificateAuthority parent refs
# - Workstation — triple-nested (cluster → config → workstation)
# - Domains Registration — non-standard create (register_domain)
# - Dataproc Cluster/Job — flat params (set_project_id+set_region), not resource_name
# - ResourceManager Folder/Project/TagKey/TagValue — parent embedded in body, not set_parent
