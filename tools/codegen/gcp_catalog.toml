# GCP Resource Catalog for smelt-codegen batch generation.
# Each [[resource]] entry maps a GCP SDK struct to its smelt resource type.
#
# Phase 1: Compute resources (standard pattern) + select resource_name APIs
# Phase 2 (TODO): DNS, SQL, Container, IAM, Monitoring, Logging (require API-specific codegen)

# ─── Compute ────────────────────────────────────────────────────────────────

[[resource]]
struct_name = "Network"
sdk_crate = "google-cloud-compute-v1"
sdk_client = "Networks"
api_style = "compute"
scope = "global"

