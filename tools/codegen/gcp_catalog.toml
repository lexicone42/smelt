client_accessor = "secretmanager"
api_style = "resource_name"
scope = "global"
parent_format = "projects/{project}/secrets/{parent_resource}"
crud_create = "add_secret_version"
crud_read = "get_secret_version"
crud_delete = "destroy_secret_version"

