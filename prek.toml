#:schema: https://www.schemastore.org/prek.json

# Fast checks only on pre-commit. Run `cargo clippy` and `cargo test`
# manually before pushing — they take 1-2 min on this workspace.

[[repos]]
repo = "builtin"
hooks = [
    { id = "trailing-whitespace" },
    { id = "end-of-file-fixer" },
    { id = "check-added-large-files", args = ["--maxkb=500"] },
    { id = "check-merge-conflict" },
    { id = "check-toml" },
]

[[repos]]
repo = "local"
hooks = [
    {
        id = "cargo-fmt",
        name = "cargo fmt --check",
        entry = "cargo fmt --check",
        language = "system",
        pass_filenames = false,
        always_run = true,
    },
    {
        id = "smelt-fmt",
        name = "smelt fmt --check",
        entry = "bash -c 'if find . -name \"*.smelt\" -not -path \"./.smelt/*\" | grep -q .; then cargo run --frozen --quiet -- fmt --check; fi'",
        language = "system",
        pass_filenames = false,
        always_run = true,
    },
]
