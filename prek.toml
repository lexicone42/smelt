#:schema: https://www.schemastore.org/prek.json

# Hooks are ordered fast → slow. Builtins (trailing-whitespace, end-of-file-fixer)
# auto-fix files — prek will fail the commit so you can re-stage and retry.
# All cargo hooks are check-only (no file modifications).

[[repos]]
repo = "builtin"
hooks = [
    { id = "trailing-whitespace" },
    { id = "end-of-file-fixer" },
    { id = "check-added-large-files", args = ["--maxkb=500"] },
    { id = "check-merge-conflict" },
    { id = "check-toml" },
]

[[repos]]
repo = "local"
hooks = [
    {
        id = "cargo-fmt",
        name = "cargo fmt --check",
        entry = "cargo fmt --check",
        language = "system",
        pass_filenames = false,
        always_run = true,
    },
    {
        id = "cargo-clippy",
        name = "cargo clippy (frozen)",
        entry = "cargo clippy --frozen --all-targets -- -D warnings",
        language = "system",
        pass_filenames = false,
        always_run = true,
    },
    {
        id = "cargo-test",
        name = "cargo test (frozen)",
        entry = "cargo test --frozen",
        language = "system",
        pass_filenames = false,
        always_run = true,
    },
    {
        id = "cargo-deny",
        name = "cargo deny check (frozen)",
        entry = "cargo deny check",
        language = "system",
        pass_filenames = false,
        always_run = true,
    },
    {
        id = "smelt-fmt",
        name = "smelt fmt --check",
        entry = "bash -c 'if find . -name \"*.smelt\" -not -path \"./.smelt/*\" | grep -q .; then cargo run --frozen --quiet -- fmt --check; fi'",
        language = "system",
        pass_filenames = false,
        always_run = true,
    },
]
